name: Bug Report
description: Report a reproducible defect in firmware, documentation, or tooling
title: "[BUG] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Clear and concise description of the issue
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Flash firmware
        2. Connect sensor on I2C bus
        3. Run...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: input
    id: hardware
    attributes:
      label: Hardware
      placeholder: ESP32 DevKitC / STM32 Nucleo / Raspberry Pi model

  - type: input
    id: firmware
    attributes:
      label: Firmware Version / Commit
      placeholder: v1.2.0 or commit SHA

  - type: textarea
    id: logs
    attributes:
      label: Logs / Serial Output
      render: shell
